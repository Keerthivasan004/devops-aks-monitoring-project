name: CI-CD to AKS

on:
  push:
    branches:
      - main

env:
  ACR_NAME: devopsacr12345
  ACR_LOGIN_SERVER: devopsaks-0ajt97n0.hcp.centralindia.azmk8s.io
  IMAGE_NAME: devopsapp
  RESOURCE_GROUP: devops-rg
  AKS_CLUSTER: devops-aks

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and Push Image
        run: |
          az acr login --name $ACR_NAME
          docker build -t $ACR_LOGIN_SERVER/$IMAGE_NAME:latest .
          docker push $ACR_LOGIN_SERVER/$IMAGE_NAME:latest

      - name: Set AKS Context
        run: |
          az aks get-credentials \
            --resource-group $RESOURCE_GROUP \
            --name $AKS_CLUSTER \
            --overwrite-existing

      - name: Deploy to AKS
        run: |
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
