name: CI-CD to AKS

on:
  push:
    branches:
      - master

env:
  ACR_NAME: devopsacr12345
  ACR_LOGIN_SERVER: devopsaks-0ajt97n0.hcp.centralindia.azmk8s.io
  IMAGE_NAME: devopsapp
  RESOURCE_GROUP: devops-rg
  AKS_CLUSTER: devops-aks

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and Push Image
        run: |
          az acr login --name $ACR_NAME
          docker build -t $ACR_LOGIN_SERVER/$IMAGE_NAME:latest -f app/Dockerfile app
          docker push $ACR_LOGIN_SERVER/$IMAGE_NAME:latest

      - name: Set AKS context
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ env.RESOURCE_GROUP }}
          cluster-name: ${{ env.AKS_CLUSTER }}

      - name: Deploy to AKS
        uses: azure/k8s-deploy@v4
        with:
          manifests: |
            k8s/deployment.yaml
            k8s/service.yaml
          images: |
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest
